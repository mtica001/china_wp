        - text: A-Level和IB DP是国际高中阶段最主流的两套体系，也是直接决定大学申请结果的关键所在。A-Level选科灵活，按科目报考；IB DP则要同时完成6门科目、一篇4000字的EE拓展论文、TOK知识理论，外加CAS项目——
        - emphasis [ref=e234]: 每一项都不轻松
        - text: ，叠在一起的压力更是显而易见。
      - paragraph [ref=e235]: 英国顶尖大学对A-Level成绩精确到每一个等级；IB满分45分，全球平均分在30分左右，竞争相当激烈。不少孩子进入DP阶段才发现，学校课堂的内容能给到的往往只是大框架，IA怎么做、EE选什么题、TOK怎么写——这些"上课很少讲清楚"的部分，反而是拿分的关键。
      - paragraph [ref=e236]: 我们的老师在A-Level和IB DP各科都有实际辅导经验，EE论文从选题到最终稿、IA从实验设计到报告写作，都可以完整支持。
