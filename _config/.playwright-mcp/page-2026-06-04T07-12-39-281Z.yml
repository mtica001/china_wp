        - text: IGCSE是英国GCSE课程的国际版本，在亚洲各地的国际学校里几乎随处可见；IB MYP则是国际文凭组织为11至16岁学生设计的综合课程体系。两者都强调批判性思维和跨学科学习，
        - emphasis [ref=e99]: 对中文背景的孩子来说，挑战不只是学科本身
        - text: 。
      - paragraph [ref=e100]: 难就难在：要用英文理解，还要用英文表达。数学推导、化学反应、历史论文，换到全英文环境，理解的成本一下子就上去了。我们遇到过不少孩子，在国内学得很好，进了国际学校之后卡在语言表达上——不是不懂，是说不出来、写不准确。
      - paragraph [ref=e101]: TCK的老师可以用中文解释、用英文练习，按孩子的节奏灵活切换。不是把学生教懂为止——而是帮他们真正能在课堂上、在考试里把掌握的东西表达出来。
